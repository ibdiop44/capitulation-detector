<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Capitulation Detector</title>
<style>
:root{--bg0:#060a0e;--bg1:#080d14;--bg2:#0a0e14;--border:#162030;--border2:#1e3a5f;--text:#b8c8d8;--dim:#4a6480;--dim2:#2d4a64;--green:#22c55e;--red:#ef4444;--yellow:#fbbf24;--orange:#f97316;--blue:#38bdf8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--text);font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:11px;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#162030}
#topbar{background:var(--bg1);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;position:sticky;top:0;z-index:100}
#topbar h1{font-size:11px;font-weight:700;color:#e2e8f0;letter-spacing:.07em}
.tag{background:#0d1b2a;border:1px solid var(--border2);border-radius:2px;padding:1px 5px;color:#3d6a9c;font-size:8px}
#mode-tag{font-size:8px;border-radius:2px;padding:1px 6px;border:1px solid}
#price-display{color:#94a3b8;font-weight:700;font-size:13px}
#status-dot{font-size:9px}
#sym-bar{background:var(--bg1);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
#sym-bar label{color:var(--dim);font-size:9px}
#sym-input{background:#0d1b2a;border:1px solid var(--border2);color:#93c5fd;border-radius:3px;padding:4px 8px;font-size:11px;font-family:inherit;width:120px;text-transform:uppercase}
#sym-input:focus{outline:none;border-color:#3b82f6}
.sym-btn{background:#0d1b2a;border:1px solid var(--border);color:var(--dim);border-radius:3px;padding:3px 8px;cursor:pointer;font-size:9px;font-family:inherit}
.sym-btn:hover{border-color:var(--border2);color:#93c5fd}
#apply-btn{background:#162030;border:1px solid var(--border2);color:#93c5fd;border-radius:3px;padding:4px 12px;cursor:pointer;font-size:9px;font-family:inherit;font-weight:700}
#pause-btn{background:var(--bg2);border:1px solid var(--border);color:var(--dim);border-radius:3px;padding:4px 10px;cursor:pointer;font-size:9px;font-family:inherit;margin-left:auto}
#pause-btn.paused{border-color:#3b82f6;color:#93c5fd;background:#1e3a5f}
#tabs{display:flex;gap:2px;padding:8px 12px 0;border-bottom:1px solid var(--border);background:var(--bg1)}
.tab-btn{background:transparent;border:1px solid transparent;border-bottom:1px solid var(--border);color:var(--dim2);padding:4px 14px;cursor:pointer;font-size:9px;font-family:inherit;letter-spacing:.08em;border-radius:3px 3px 0 0}
.tab-btn.active{background:var(--bg2);border-color:var(--border);border-bottom-color:var(--bg2);color:#93c5fd}
#main{display:grid;grid-template-columns:1fr 270px;height:calc(100vh - 115px)}
#content{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
#sidebar{border-left:1px solid var(--border);background:#06090d;display:flex;flex-direction:column;overflow:hidden}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px}
.card-title{color:var(--dim2);font-size:8px;letter-spacing:.08em;margin-bottom:8px}
#stat-row{display:flex;gap:5px;flex-wrap:wrap}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:4px 9px;min-width:80px}
.stat-k{color:var(--dim2);font-size:8px;margin-bottom:2px}
.stat-v{font-size:13px;font-weight:700}
.banner{border-radius:4px;padding:9px 14px;display:flex;align-items:flex-start;gap:10px}
.banner-title{font-size:12px;font-weight:700;letter-spacing:.08em}
.banner-detail{font-size:8px;color:#64748b;margin-top:3px;line-height:1.5}
.badge-kelly{border-radius:3px;padding:5px 10px;text-align:center;margin-left:auto;flex-shrink:0}
#battle-bar-wrap{height:32px;border-radius:3px;overflow:hidden;display:flex}
#buy-seg,#sell-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;transition:width .4s ease}
#vol-chart{display:flex;gap:1px;align-items:flex-end;height:60px}
.vol-bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end}
svg{display:block}
.mtable{width:100%;border-collapse:collapse;font-size:8px}
.mtable th{padding:3px 6px;color:var(--dim2);text-align:left;font-weight:500;font-size:7px;border-bottom:1px solid var(--border)}
.mtable td{padding:3px 6px;border-bottom:1px solid #0d1420}
.status-badge{border-radius:2px;padding:0 5px;font-size:8px;font-weight:700}
.lvl-badge{border-radius:2px;padding:0 4px;font-size:7px}
#sidebar-head{padding:7px 10px;border-bottom:1px solid var(--border);background:var(--bg1);display:flex;justify-content:space-between}
#alerts-list{flex:1;overflow-y:auto;padding:5px}
.alert-card{border-radius:3px;padding:5px 7px;margin-bottom:3px;border-left-width:3px;border-left-style:solid}
#live-metrics{border-top:1px solid var(--border);padding:7px 10px;background:var(--bg1)}
.metric-row{display:flex;justify-content:space-between;margin-bottom:3px}
.metric-k{color:#1e3a5f;font-size:8px}
.metric-v{font-size:8px;font-weight:600}
/* SCANNER */
#scanner-body{overflow-y:auto;max-height:calc(100vh - 240px)}
.sc-table{width:100%;border-collapse:collapse;font-size:9px}
.sc-table th{position:sticky;top:0;background:#0a0e14;padding:4px 8px;color:var(--dim2);font-weight:500;font-size:8px;border-bottom:1px solid var(--border);text-align:right;cursor:pointer;white-space:nowrap;user-select:none}
.sc-table th:nth-child(-n+2){text-align:left}
.sc-table th.sorted{color:var(--yellow)}
.sc-table td{padding:4px 8px;border-bottom:1px solid #0a0e14;text-align:right;white-space:nowrap}
.sc-table td:nth-child(-n+2){text-align:left}
.sc-row{cursor:pointer;transition:background .1s}
.sc-row:hover{background:#0d1b2a}
.sc-row.act{background:#0d1b2a;border-left:2px solid #3b82f6}
.sc-sym{font-weight:700;color:#93c5fd;font-size:10px}
.fi-bar{display:inline-block;height:6px;border-radius:2px;vertical-align:middle;margin-left:3px}
.filter-row{display:flex;gap:5px;align-items:center;padding:5px 10px;background:var(--bg2);border:1px solid var(--border);border-top:none;flex-wrap:wrap}
.fbtn{background:var(--bg1);border:1px solid var(--border);color:var(--dim);border-radius:2px;padding:2px 7px;cursor:pointer;font-size:8px;font-family:inherit}
.fbtn.on{border-color:var(--border2);color:#93c5fd}
#scan-search{background:var(--bg1);border:1px solid var(--border);color:var(--text);border-radius:2px;padding:2px 7px;font-size:9px;font-family:inherit;width:75px}
#scan-search:focus{outline:none;border-color:var(--border2)}
.doc-section{border-radius:4px;padding:10px;margin-bottom:8px}
.doc-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:9px;line-height:1.4;gap:8px}
.sz-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #0d1420}
@keyframes flashPulse{0%,100%{opacity:1}50%{opacity:.65}}
.flash{animation:flashPulse .5s ease-in-out 4}
@media(max-width:600px){
  #main{grid-template-columns:1fr}
  #sidebar{display:none}
  .stat{min-width:70px}
  #scanner-body{max-height:calc(100vh - 300px)}
}
</style>

<body>

<div id="topbar">
  <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
    <h1>⚔ CAPITULATION DETECTOR</h1>
    <span class="tag">SPOT+PERP</span><span class="tag">DOCTRINE v2.0</span>
    <span id="mode-tag" style="color:#4a8c30;border-color:#1a3a10;background:#0d1501">CONNECTING…</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="price-display">—</span>
    <span id="status-dot" style="color:#4a6480">○ STANDBY</span>
  </div>
</div>

<div id="sym-bar">
  <label>SYMBOLE :</label>
  <input id="sym-input" type="text" value="BTC/USDT" spellcheck="false"/>
  <button id="apply-btn" onclick="applySymbol()">APPLIQUER</button>
  <span style="color:var(--dim2);font-size:8px">Presets :</span>
  <button class="sym-btn" onclick="setSymbol('BTC/USDT')">BTC</button>
  <button class="sym-btn" onclick="setSymbol('ETH/USDT')">ETH</button>
  <button class="sym-btn" onclick="setSymbol('SOL/USDT')">SOL</button>

<div id="tabs">
  <button class="tab-btn active" onclick="setTab('battle',this)">BATTLE</button>
  <button class="tab-btn" onclick="setTab('top100',this)">TOP 100 ⚡</button>
  <button class="tab-btn" onclick="setTab('doctrine',this)">DOCTRINE</button>
  <button class="tab-btn" onclick="setTab('sizing',this)">SIZING</button>
</div>

<div id="main">
  <div id="content"><div style="color:var(--dim2);padding:30px;text-align:center">⟳ Connexion…</div></div>
  <div id="sidebar">
    <div id="sidebar-head">
      <span style="font-size:8px;letter-spacing:.1em;color:var(--dim2)">EVENT LOG</span>
      <span id="alert-count" style="font-size:8px;color:#1e3a5f">0</span>
    </div>
    <div id="alerts-list"><div style="color:#1e3a5f;font-size:9px;text-align:center;padding:20px">En attente…</div></div>
    <div id="live-metrics"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// PRIOR_TEMP — DOCTRINE §10
// ═══════════════════════════════════════════════════════════════
const P = {
  CVD_WINDOW:60, CVD_Z:1.5, OI_MIN:0.02, FUND_EXT:0.0005,
  CAP:0.72, FLIP:0.04, SPIKE:1.5,
  GA:0.10, GB:0.85,
  KP:0.45, KB:1.5, KF:0.25,
  ATR_SL:1.5, ATR_TP:2.5,
};

const SCFG = {
  BUY_CAP:   {label:'CAPITULATION ACHETEURS',color:'#ef4444',bg:'#2d0a0a',icon:'🔴'},
  SELL_CAP:  {label:'CAPITULATION VENDEURS', color:'#22c55e',bg:'#052e16',icon:'🟢'},
  BULL_FLIP: {label:'FLIP HAUSSIER',         color:'#4ade80',bg:'#071c10',icon:'⬆'},
  BEAR_FLIP: {label:'FLIP BAISSIER',         color:'#f87171',bg:'#1c0505',icon:'⬇'},
  BEAR_DIV:  {label:'DIV. BAISSIÈRE CVD/P',  color:'#f97316',bg:'#1c0a00',icon:'⚠'},
  BULL_DIV:  {label:'DIV. HAUSSIÈRE CVD/P',  color:'#38bdf8',bg:'#001c2a',icon:'ℹ'},
  PERP_DIV:  {label:'PERP↔SPOT DIV',        color:'#a78bfa',bg:'#130d2a',icon:'↕'},
  FUND_C:    {label:'FUNDING CONTRA-DIR',    color:'#fbbf24',bg:'#1c1300',icon:'⚡'},
};

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let symbol='BTC/USDT', paused=false, currentTab='battle', gH=0.0001;
let bars=[], alerts=[];
let lastTradeId=0, lastPerpTradeId=0;
let lastOI=null, lastOIPrev=null, lastFunding=0, lastSpread=0, lastPrice=0;
let pollTimer=null, oiTimer=null, scanTimer=null;
let scanData=[], scSort='forceIdx', scDir=-1, scFilter='all', scSearch='';
let consecutiveErrors=0;

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const toBP = s => s.replace('/','');
const toFP = s => s.replace('/USDT','USDT');
function fmtV(v){return v>=1e9?`${(v/1e9).toFixed(2)}B`:v>=1e6?`${(v/1e6).toFixed(2)}M`:v>=1e3?`${(v/1e3).toFixed(1)}K`:Math.round(v)}
function fmtP(v){return v>=10000?`$${v.toLocaleString('en-US',{maximumFractionDigits:0})}`:v>=1?`$${v.toFixed(3)}`:`$${v.toPrecision(4)}`}
function fmtPct(v){return`${(v*100).toFixed(2)}%`}
function fmtZ(v){return`${v>=0?'+':''}${v.toFixed(2)}σ`}
function ts(){return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function cc(h,o){return h+(Math.round(o*255).toString(16).padStart(2,'0'))}
function setMode(t,c,b){const e=document.getElementById('mode-tag');if(e){e.textContent=t;e.style.color=c;e.style.borderColor=b;e.style.background=b+'22'}}

// ═══════════════════════════════════════════════════════════════
// GARCH(1,1) — Bollerslev 1986
// ═══════════════════════════════════════════════════════════════
function garch(ret){gH=1e-6+P.GA*ret*ret+P.GB*gH}

// ═══════════════════════════════════════════════════════════════
// DATA FETCH — Binance REST (works everywhere incl. GitHub Pages)
// /api/v3/aggTrades: real taker flow, side from isBuyerMaker
// /fapi/v1/aggTrades: perp taker flow
// /fapi/v1/openInterest: OI in contracts
// /fapi/v1/premiumIndex: funding rate
// /api/v3/ticker/bookTicker: bid/ask spread
// ═══════════════════════════════════════════════════════════════
async function fetchTrades(){
  if(paused) return;
  const pair = toBP(symbol);
  const fpair = toFP(symbol);
  const now = Date.now();
  const since = now - 5000; // last 5 seconds

  try {
    // Spot trades — isBuyerMaker=false → buyer is taker (Q>0, Kyle 1985)
    const url = lastTradeId > 0
      ? `https://api.binance.com/api/v3/aggTrades?symbol=${pair}&fromId=${lastTradeId}&limit=1000`
      : `https://api.binance.com/api/v3/aggTrades?symbol=${pair}&startTime=${since}&limit=1000`;

    const r = await fetch(url);
    if(!r.ok) throw new Error('spot HTTP '+r.status);
    const trades = await r.json();

    let spotBuy=0, spotSell=0, price=lastPrice;
    for(const t of trades){
      const p = parseFloat(t.p);
      const q = parseFloat(t.q);
      const vol = p * q;
      price = p;
      // isBuyerMaker=true → sell-initiated (maker=buyer → taker=seller)
      // isBuyerMaker=false → buy-initiated (taker=buyer, Kyle Q>0)
      if(t.m) spotSell += vol;
      else     spotBuy  += vol;
      if(t.a > lastTradeId) lastTradeId = t.a;
    }

    // Perp trades
    let perpBuy=0, perpSell=0;
    try {
      const urlP = lastPerpTradeId > 0
        ? `https://fapi.binance.com/fapi/v1/aggTrades?symbol=${fpair}&fromId=${lastPerpTradeId}&limit=1000`
        : `https://fapi.binance.com/fapi/v1/aggTrades?symbol=${fpair}&startTime=${since}&limit=1000`;
      const rp = await fetch(urlP);
      if(rp.ok){
        const pt = await rp.json();
        for(const t of pt){
          const vol = parseFloat(t.p)*parseFloat(t.q);
          if(t.m) perpSell+=vol; else perpBuy+=vol;
          if(t.a > lastPerpTradeId) lastPerpTradeId = t.a;
        }
      }
    } catch(e){}

    if(trades.length === 0 && spotBuy+spotSell === 0) return;

    lastPrice = price;
    document.getElementById('price-display').textContent = fmtP(price)+' · '+symbol;

    // Build bar
    const totalVol = spotBuy+spotSell+perpBuy+perpSell;
    const totalB = spotBuy+perpBuy, totalS = spotSell+perpSell;
    const buyRatio = totalB+totalS>0 ? totalB/(totalB+totalS) : 0.5;

    // OI delta
    let oiDeltaPct = 0;
    if(lastOI!==null && lastOIPrev!==null && lastOIPrev>0)
      oiDeltaPct = (lastOI-lastOIPrev)/lastOIPrev;

    const prev = bars.length ? bars[bars.length-1] : null;
    if(prev && prev.price>0) garch((price-prev.price)/prev.price);

    const bar = {
      t:now, price, spotBuy, spotSell, perpBuy, perpSell,
      totalVol, buyRatio, oiDeltaPct,
      funding:lastFunding,
      spread:lastSpread>0 ? lastSpread : price*0.0001,
    };

    bars = [...bars.slice(-500), bar];
    consecutiveErrors = 0;
    setMode('LIVE','#22c55e','#166534');

    const sig = computeSignals(bars);
    if(sig) checkAlerts(sig, bar);
    if(!paused) render();

  } catch(err){
    consecutiveErrors++;
    if(consecutiveErrors >= 3)
      setMode('ERREUR FETCH','#ef4444','#7f1d1d');
    console.warn('fetchTrades:', err.message);
  }
}

async function fetchOI(){
  try {
    const r = await fetch(`https://fapi.binance.com/fapi/v1/openInterest?symbol=${toFP(symbol)}`);
    if(!r.ok) return;
    const d = await r.json();
    lastOIPrev = lastOI;
    lastOI = parseFloat(d.openInterest)*lastPrice;
  } catch(e){}
}

async function fetchFunding(){
  try {
    const r = await fetch(`https://fapi.binance.com/fapi/v1/premiumIndex?symbol=${toFP(symbol)}`);
    if(!r.ok) return;
    const d = await r.json();
    lastFunding = parseFloat(d.lastFundingRate)||0;
    if(!lastPrice) lastPrice = parseFloat(d.markPrice)||0;
  } catch(e){}
}

async function fetchSpread(){
  try {
    const r = await fetch(`https://api.binance.com/api/v3/ticker/bookTicker?symbol=${toBP(symbol)}`);
    if(!r.ok) return;
    const d = await r.json();
    lastSpread = parseFloat(d.askPrice)-parseFloat(d.bidPrice);
    if(!lastPrice) lastPrice = parseFloat(d.askPrice)||0;
  } catch(e){}
}

// ═══════════════════════════════════════════════════════════════
// SIGNAL ENGINE — Kyle 1985, Cont 2014, Bouchaud 2004
// ═══════════════════════════════════════════════════════════════
function computeSignals(bars){
  const n=bars.length; if(n<10) return null;
  const W=Math.min(P.CVD_WINDOW,n);
  const win=bars.slice(-W), W20=bars.slice(-Math.min(20,n));
  const last3=bars.slice(-3), prev3=bars.slice(-6,-3), last=bars[n-1];

  // L1 CVD spot (Kyle 1985 Q)
  const cvdS = win.reduce((s,b)=>s+b.spotBuy-b.spotSell,0);
  const cvdPrev = bars.slice(-W-1,-1).reduce((s,b)=>s+b.spotBuy-b.spotSell,0);
  const cvdD = cvdS-cvdPrev;

  // z-score GARCH-adjusted (PRIOR_TEMP gaussian)
  const vals=bars.slice(-Math.min(W*2,n)).map(b=>b.spotBuy-b.spotSell);
  const mean=vals.reduce((s,v)=>s+v,0)/vals.length;
  const std=Math.sqrt(vals.reduce((s,v)=>s+(v-mean)**2,0)/vals.length)||1;
  const gStd=Math.max(std*0.5,Math.sqrt(gH)*1e6);
  const cvdZ=(last.spotBuy-last.spotSell-mean)/gStd;

  // L1 CVD perp (Zhivkov 2026)
  const cvdP=win.reduce((s,b)=>s+b.perpBuy-b.perpSell,0);
  const sDir=Math.sign(cvdS), pDir=Math.sign(cvdP);
  const perpDiv=pDir!==sDir && cvdP!==0;

  // L2 OI (Bouchaud 2004 Inv6)
  const oi=last.oiDeltaPct;
  const oiI = sDir>0&&oi>P.OI_MIN?'NEW_LONGS':sDir>0&&oi<-P.OI_MIN?'SHORT_COVER':
               sDir<0&&oi<-P.OI_MIN?'NEW_SHORTS':sDir<0&&oi>P.OI_MIN?'LONG_COVER':'ROTATION';
  const conv=(oiI==='NEW_LONGS'||oiI==='NEW_SHORTS')?1.0:(oiI==='SHORT_COVER'||oiI==='LONG_COVER')?0.7:0.4;

  // L2 Funding (Liu-Tsyvinski 2022 Inv9)
  const fd=last.funding, fdE=Math.abs(fd)>P.FUND_EXT;
  const fdL=fd>P.FUND_EXT, fdS=fd<-P.FUND_EXT;

  // Kyle lambda proxy (Glosten-Milgrom 1985)
  const vStd=Math.sqrt(W20.reduce((s,b)=>s+(b.totalVol-last.totalVol)**2,0)/W20.length)||1;
  const kL=last.spread/(2*vStd);

  // VPIN (Easley 2012 Inv10) — logged only
  const tAbs=W20.reduce((s,b)=>s+Math.abs(b.spotBuy-b.spotSell),0);
  const tAll=W20.reduce((s,b)=>s+b.spotBuy+b.spotSell,0);
  const vpin=tAll>0?tAbs/tAll:null;

  // Battle
  const rN=last3.reduce((s,b)=>s+b.buyRatio,0)/last3.length;
  const rP=prev3.length?prev3.reduce((s,b)=>s+b.buyRatio,0)/prev3.length:0.5;
  const rD=rN-rP;
  const aV=W20.reduce((s,b)=>s+b.totalVol,0)/W20.length||1;
  const vSpike=last.totalVol/aV;
  const bDom=rN>P.CAP, sDom=rN<(1-P.CAP);
  const tB=W20.reduce((s,b)=>s+b.spotBuy+b.perpBuy,0);
  const tS=W20.reduce((s,b)=>s+b.spotSell+b.perpSell,0);
  const fIdx=(tB-tS)/(tB+tS||1);

  // ATR (L3 sizing only)
  const px=bars.slice(-14).map(b=>b.price);
  const atr=px.length>=2?px.reduce((s,p,i)=>i===0?0:s+Math.abs(p-px[i-1])/p,0)/(px.length-1):0.001;

  // CASCADE (DOCTRINE §6)
  const buyCap  = sDom&&vSpike>P.SPIKE&&cvdD<0&&Math.abs(cvdZ)>P.CVD_Z&&rD<-P.FLIP&&!fdS;
  const sellCap = bDom&&vSpike>P.SPIKE&&cvdD>0&&Math.abs(cvdZ)>P.CVD_Z&&rD>P.FLIP&&!fdL;
  const bullFlip = rD>P.FLIP&&rN>0.52&&rP<0.50&&!sellCap;
  const bearFlip = rD<-P.FLIP&&rN<0.48&&rP>0.50&&!buyCap;

  // LOG ONLY (L3 — never veto)
  const pUp=n>=5&&last.price>bars[n-5].price;
  const bearDiv=pUp&&cvdD<-(Math.abs(cvdPrev)*0.03);
  const bullDiv=!pUp&&cvdD>(Math.abs(cvdPrev)*0.03);
  const pDA=perpDiv&&Math.abs(cvdZ)>P.CVD_Z;
  const fdC=(fdL&&sDir<0)||(fdS&&sDir>0);

  const kR=(P.KP*P.KB-(1-P.KP))/P.KB;
  const kSz=Math.max(0,kR)*P.KF*conv;

  return {
    cvdS,cvdP,cvdD,cvdZ,sDir,oi,oiI,conv,fdE,fdL,fdS,fdC,fd:last.funding,
    vpin,kL,rN,rP,rD,vSpike,aV,fIdx,bDom,sDom,
    buyCap,sellCap,bullFlip,bearFlip,bearDiv,bullDiv,pDA,
    kSz,atr,sl:atr*P.ATR_SL,tp:atr*P.ATR_TP,
    act:[buyCap,sellCap,bullFlip,bearFlip,bearDiv,bullDiv,pDA,fdC].filter(Boolean).length,
  };
}

function checkAlerts(s,b){
  const now=ts(), ev=[];
  if(s.buyCap)  ev.push({t:'BUY_CAP', time:now,price:b.price,vs:s.vSpike,z:s.cvdZ});
  if(s.sellCap) ev.push({t:'SELL_CAP',time:now,price:b.price,vs:s.vSpike,z:s.cvdZ});
  if(s.bullFlip)ev.push({t:'BULL_FLIP',time:now,price:b.price});
  if(s.bearFlip)ev.push({t:'BEAR_FLIP',time:now,price:b.price});
  if(s.bearDiv) ev.push({t:'BEAR_DIV', time:now,price:b.price});
  if(s.bullDiv) ev.push({t:'BULL_DIV', time:now,price:b.price});
  if(s.pDA)     ev.push({t:'PERP_DIV',time:now,price:b.price});
  if(s.fdC)     ev.push({t:'FUND_C',  time:now,price:b.price,funding:b.funding});
  if(ev.length){
    alerts=[...ev,...alerts].slice(0,40);
    const ac=document.getElementById('alert-count');
    if(ac) ac.textContent=alerts.length;
    renderAlerts();
  }
}

// TOP 100 SCANNER
// Spot 24h: volume + price change
// Futures 24h: real taker buy/sell split (takerBuyQuoteAssetVolume)
// ═══════════════════════════════════════════════════════════════
async function fetchScanner(){
  if(currentTab==='top100'){
    const el=document.getElementById('content');
    if(el&&scanData.length===0)
      el.innerHTML='<div style="color:var(--dim2);padding:30px;text-align:center">⟳ Chargement top 100 Binance…</div>';
  }
  try {
    const [rs,rf]=await Promise.all([
      fetch('https://api.binance.com/api/v3/ticker/24hr'),
      fetch('https://fapi.binance.com/fapi/v1/ticker/24hr'),
    ]);
    const spot=rs.ok?await rs.json():[];
    const fut =rf.ok?await rf.json():[];

    // Real taker split from futures (takerBuyQuoteAssetVolume is real)
    const fm={};
    for(const f of fut){
      if(f.symbol.endsWith('USDT')){
        const b=parseFloat(f.takerBuyQuoteAssetVolume)||0;
        const tot=parseFloat(f.quoteVolume)||1;
        fm[f.symbol]={b,s:tot-b,tot,real:true};
      }
    }

    const BL=/^(USDC|BUSD|TUSD|USDP|DAI|FDUSD|EUR|GBP|BRL|TRY|UP|DOWN|BULL|BEAR|3L|3S|HEDGE)/;
    const rows=spot
      .filter(d=>d.symbol.endsWith('USDT')&&!BL.test(d.symbol))
      .map(d=>{
        const vol=parseFloat(d.quoteVolume);
        const chg=parseFloat(d.priceChangePercent);
        const price=parseFloat(d.lastPrice);
        const f=fm[d.symbol];
        let bV,sV,src;
        if(f&&f.tot>0){bV=f.b;sV=f.s;src='REAL';}
        else{const r=0.5+Math.max(-0.35,Math.min(0.35,chg/20));bV=vol*r;sV=vol*(1-r);src='PROXY';}
        const fi=(bV-sV)/(bV+sV||1);
        return{sym:d.symbol.replace('USDT','/USDT'),price,vol,chg,bV,sV,fi,src,
               h:parseFloat(d.highPrice),l:parseFloat(d.lowPrice)};
      })
      .sort((a,b)=>b.vol-a.vol).slice(0,100)
      .map((d,i)=>({...d,rank:i+1}));

    scanData=rows;
    if(currentTab==='top100') renderTop100();
  } catch(e){
    console.warn('Scanner:',e.message);
    if(currentTab==='top100'){
      const el=document.getElementById('content');
      if(el) el.innerHTML=`<div style="color:#ef4444;padding:20px;text-align:center">
        ✕ Erreur fetch Binance<br>
        <span style="color:var(--dim2);font-size:9px">Vérifier la connexion réseau</span>
      </div>`;
    }
  }
}

function getScanRows(){
  let r=[...scanData];
  if(scFilter==='bull')    r=r.filter(x=>x.fi>0.05);
  if(scFilter==='bear')    r=r.filter(x=>x.fi<-0.05);
  if(scFilter==='neutral') r=r.filter(x=>Math.abs(x.fi)<=0.05);
  if(scSearch) r=r.filter(x=>x.sym.includes(scSearch.toUpperCase()));
  r.sort((a,b)=>scDir*(b[scSort]-a[scSort]));
  return r;
}

function renderSizing(sig,last){
  if(!sig)return'';
  const kR=(P.KP*P.KB-(1-P.KP))/P.KB;
  return`
    <div class="card">
      <div class="card-title">KELLY SIZING — PRIOR_TEMP (§10)</div>
      ${[
        {k:'f_kelly brut',v:`${(kR*100).toFixed(1)}%`,n:'p=0.45 b=1.5 INVENTÉS — calibrer N≥30'},
        {k:'Kelly ×fraction',v:`×${P.KF}`,n:'Quarter-Kelly PRIOR_TEMP'},
        {k:'Conviction mult',v:`×${sig.conv.toFixed(2)}`,n:`OI: ${sig.oiI}`},
        {k:'KELLY FINAL',v:fmtPct(sig.kSz),n:'',bold:true},
      ].map(r=>`<div class="sz-row">
        <span style="color:${r.bold?'#94a3b8':'var(--dim)'};font-weight:${r.bold?700:400}">${r.k}</span>
        <div style="text-align:right"><span style="color:${r.bold?'#22c55e':'#5b8fc9'};font-size:${r.bold?15:11}px">${r.v}</span>${r.n?`<div style="color:var(--dim2);font-size:8px">${r.n}</div>`:''}</div>
      </div>`).join('')}
    </div>
    <div class="card" style="margin-top:8px">
      <div class="card-title">SL/TP — ATR SIZING UNIQUEMENT, JAMAIS SIGNAL (§3)</div>
      ${[
        {k:'ATR% (14B)',v:fmtPct(sig.atr),n:'vol réalisée réelle'},
        {k:'SL',v:fmtPct(sig.sl),n:`×${P.ATR_SL} ATR PRIOR_TEMP`},
        {k:'TP',v:fmtPct(sig.tp),n:`×${P.ATR_TP} ATR PRIOR_TEMP`},
        {k:'R:R',v:`${(sig.tp/sig.sl).toFixed(2)}:1`,n:'cible ≥ 1.5:1'},
        {k:'SL prix long',v:fmtP(last.price*(1-sig.sl)),n:''},
        {k:'TP prix long',v:fmtP(last.price*(1+sig.tp)),n:''},
      ].map(r=>`<div class="sz-row">
        <span style="color:var(--dim)">${r.k}</span>
        <div style="text-align:right"><span style="color:#5b8fc9;font-size:11px">${r.v}</span>${r.n?`<div style="color:var(--dim2);font-size:8px">${r.n}</div>`:''}</div>
      </div>`).join('')}
    </div>`;
}

function renderAlerts(){
  const el=document.getElementById('alerts-list');if(!el)return;
  if(!alerts.length){el.innerHTML='<div style="color:#1e3a5f;font-size:9px;text-align:center;padding:20px">En attente…</div>';return}
  el.innerHTML=alerts.map((a,i)=>{
    const c=SCFG[a.t];
    return`<div class="alert-card" style="background:${cc(c.color,.03)};border:1px solid ${cc(c.color,i===0?.38:.12)};border-left-color:${c.color};opacity:${Math.max(.25,1-i*.03)}">
      <div style="color:${c.color};font-size:9px;font-weight:700">${c.icon} ${c.label}</div>
      <div style="display:flex;justify-content:space-between;margin-top:2px;font-size:8px;color:var(--dim2)"><span>${a.time}</span><span>${fmtP(a.price)}</span></div>
      ${a.vs?`<div style="color:var(--dim2);font-size:8px">spike ${a.vs.toFixed(2)}× · z=${fmtZ(a.z)}</div>`:''}
    </div>`;
  }).join('');
}

function renderLiveMetrics(sig,last){
  const el=document.getElementById('live-metrics');if(!el)return;
  el.innerHTML=`<div style="color:#1e3a5f;font-size:8px;letter-spacing:.08em;margin-bottom:5px">LIVE L1 METRICS</div>`+[
    {k:'SPOT buy',v:fmtV(last.spotBuy),c:'#22c55e'},
    {k:'SPOT sell',v:fmtV(last.spotSell),c:'#ef4444'},
    {k:'PERP buy',v:fmtV(last.perpBuy),c:'#22c55e88'},
    {k:'PERP sell',v:fmtV(last.perpSell),c:'#ef444488'},
    {k:'CVD z',v:fmtZ(sig.cvdZ),c:Math.abs(sig.cvdZ)>P.CVD_Z?'#fbbf24':'#4a6480'},
    {k:'VPIN',v:sig.vpin!==null?sig.vpin.toFixed(3):'—',c:'#64748b'},
    {k:'λ proxy',v:sig.kL?sig.kL.toExponential(2):'—',c:'#3d6a9c'},
    {k:'OI Δ',v:fmtPct(last.oiDeltaPct),c:last.oiDeltaPct>0?'#22c55e':'#ef4444'},
    {k:'Funding',v:fmtPct(last.funding),c:sig.fdE?'#f97316':'#4a6480'},
    {k:'Spread',v:`$${last.spread.toFixed(4)}`,c:'#4a6480'},
    {k:'Bars',v:String(bars.length),c:'#3d6a9c'},
  ].map(m=>`<div class="metric-row"><span class="metric-k">${m.k}</span><span class="metric-v" style="color:${m.c}">${m.v}</span></div>`).join('');
}
